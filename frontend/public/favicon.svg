<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    标签页图标：从品牌 logo 里取出 F 那一笔延伸下来的音符。

    没有用完整的 "LiveFlow" 文字标，是因为标签页实际渲染尺寸只有 16×16 或 32×32，
    八个字母在那个尺寸下会糊成一团灰色。图形标才认得出来。

    保留了深色底而不是只留一个咖啡色音符：透明底的图标要同时活在浅色和深色两种
    标签栏上，米色音符在白底上看不见，咖啡色音符在深色标签栏上一样看不见。
    带上自己的底色就跟环境无关了，这也是绝大多数 App 图标的做法。

    形状是照着 logo 原图量出来重画的，不是位图裁剪，所以放到任何尺寸都不糊。
  -->
  <rect width="100" height="100" rx="22" fill="#1B1310"/>
  <!-- 缩放比例是量出来的：音符原始高度 167，放到 100 的画布上占 ~78。
       比 logo 里的相对比例更满，因为图标只有音符一个元素，留太多余白会显得空 -->
  <g transform="translate(50,50) scale(0.467) translate(-286,-288)">
    <!-- 符干：logo 里 F 的竖笔，略向左下倾斜，两端圆头。
         比原 logo 略粗(17→21)，16px 下细笔画会淡到看不见 -->
    <line x1="331" y1="205" x2="289" y2="335"
          stroke="#F0EADF" stroke-width="21" stroke-linecap="round"/>
    <!-- 符头：基线下方那个实心圆，横向略宽 -->
    <ellipse cx="267" cy="342" rx="34" ry="29" fill="#F0EADF"/>
  </g>
</svg>
