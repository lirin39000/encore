name: Daily show scrape

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00。挪到早上是因为流程最后一步会给订阅用户发提醒邮件，
    # 原来半夜 0 点跑，邮件就半夜到，手机开了邮件提醒的人会被吵醒
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install wx cloud sync dependencies
        working-directory: backend/scraper/sync_to_wx_cloud
        run: npm install

      - name: Run daily pipeline
        working-directory: backend/scraper
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          AMAP_WEB_SERVICE_KEY: ${{ secrets.AMAP_WEB_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WX_CLOUD_ENV: "cloud1-d9gwsf1jq9b490005"
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          # 邮件推送用。这两个都不是密钥：一个是发信地址，一个是邮件里验证/退订链接的
          # 基址(必须是外网可达的后端地址)。缺了的话推送那步会静默跳过，不报错
          ALIYUN_DM_ACCOUNT_NAME: "notice@mail.encore.monster"
          SITE_BASE_URL: "https://encore-production-9222.up.railway.app"
          # 推送有邮件发失败时，往这个地址发一封纯文本预警。这个流程没人盯日志，
          # 不报警的话出问题只能等用户来问。不是密钥，就是你自己的收件邮箱
          ADMIN_ALERT_EMAIL: "lirin3900@gmail.com"
        run: python daily_pipeline.py
