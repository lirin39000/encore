name: Daily show scrape

on:
  schedule:
    # UTC 16:00 = 北京时间次日 00:00
    - cron: "0 16 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install wx cloud sync dependencies
        working-directory: backend/scraper/sync_to_wx_cloud
        run: npm install

      - name: Run daily pipeline
        working-directory: backend/scraper
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          AMAP_WEB_SERVICE_KEY: ${{ secrets.AMAP_WEB_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WX_CLOUD_ENV: "cloud1-d9gwsf1jq9b490005"
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: python daily_pipeline.py
